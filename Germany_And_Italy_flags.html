<!DOCTYPE html>
<html>
<head>
    <title>Flags using SVG</title>
</head>
<body style="text-align:center; font-family: Arial;">

    <!-- About Germany -->
    <h1>About Germany</h1>

    <svg width="300" height="180">
        <!-- Black -->
        <rect x="0" y="0" width="300" height="60" fill="black" />
        
        <!-- Red -->
        <rect x="0" y="60" width="300" height="60" fill="red" />
        
        <!-- Gold -->
        <rect x="0" y="120" width="300" height="60" fill="gold" />
    </svg>

    <br><br>

    <!-- About Italy -->
    <h1>About Italy</h1>

    <svg width="300" height="180">
        <!-- Green -->
        <rect x="0" y="0" width="100" height="180" fill="green" />
        
        <!-- White -->
        <rect x="100" y="0" width="100" height="180" fill="white" />
        
        <!-- Red -->
        <rect x="200" y="0" width="100" height="180" fill="red" />
    </svg>
