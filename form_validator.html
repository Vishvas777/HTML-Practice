<html>
    <head>
        <script>
            function validate()
            {
               if(document.myForm.name.value == "")
               
                   alert("Please provide your name!");
                  
               }
            
        </script>
    </head>
    <body>
        <form name="myForm" onsubmit="return validate()">
            Name: <input type="text" name="name">
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
