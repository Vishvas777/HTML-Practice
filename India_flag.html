<!DOCTYPE html>
<html>
<head>
    <title>Indian Flag - SVG</title>
</head>
<body>

<svg width="450" height="300">

    <!-- Top Saffron -->
    <rect x="50" y="50" width="350" height="66" fill="#FF9933"/>

    <!-- Middle White -->
    <rect x="50" y="116" width="350" height="66" fill="white"/>

    <!-- Bottom Green -->
    <rect x="50" y="182" width="350" height="66" fill="#138808"/>

    <!-- Ashoka Chakra Outer Circle -->
    <circle cx="225" cy="149" r="30" 
            fill="none" 
            stroke="#000080" 
            stroke-width="2"/>

    <!-- Chakra Spokes -->
    <g stroke="#000080" stroke-width="2">
        <line x1="225" y1="119" x2="225" y2="179"/>
        <line x1="195" y1="149" x2="255" y2="149"/>
        <line x1="204" y1="128" x2="246" y2="170"/>
        <line x1="204" y1="170" x2="246" y2="128"/>
        <line x1="215" y1="120" x2="235" y2="178"/>
        <line x1="235" y1="120" x2="215" y2="178"/>
        <line x1="195" y1="139" x2="255" y2="159"/>
        <line x1="195" y1="159" x2="255" y2="139"/>
    </g>

</svg>

</body>
</html>
